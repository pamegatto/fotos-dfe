<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Document Classifier | FDR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-sub: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 { 
            font-weight: 800;
            font-size: 1.8rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p { 
            font-size: 0.95rem;
            color: var(--text-sub);
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        .upload-area {
            margin: 1.5rem 0;
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
            background: rgba(248, 250, 252, 0.5);
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(248, 250, 252, 1);
        }

        button {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.5);
        }

        #document-preview {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        #label-container {
            margin-top: 28px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .prediction-item {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
            transition: all 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        .prediction-item:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        .prediction-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            position: relative;
            z-index: 2;
        }

        .prediction-name {
            font-weight: 600;
            color: var(--text-main);
        }

        .prediction-percentage {
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            min-width: 40px;
            text-align: right;
        }

        .prediction-bar-container {
            position: relative;
            height: 8px;
            background: rgba(226, 232, 240, 0.6);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 8px;
        }

        .prediction-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            width: 0%;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Clasificador de Documentos FDR</h1>
        <p>Subí una foto para que la IA identifique su autor</p>
        
        <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleImage(event)">
        
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <img id="document-preview" style="display: none;">
        </div>
        
        <button type="button" onclick="document.getElementById('file-input').click()">Seleccionar Documento</button>
        
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
